# Do NOT change this!!
config-version: 3

messages:
  sell: '<green><bold>+ ${MONEY} <gray>[ <yellow>Sold <italic>{ITEMS}</italic> <yellow>Items<gray> ]'
  no-access: '<dark_red>You do not have access to this Shop'
  total: '<dark_green>TOTAL: <gold>+ ${MONEY}'
  get-nothing: '<dark_red>Sorry, but you will get nothing for these Items :('
  dropped: '<red>You have been given back some of your Items because you could not sell them...'
  no-permission: '<red>You do not have the required Permission to do this!'
  unknown-shop: '<red>Unknown Shop!'
  no-items: '<red>Sorry, but you have no Items that can be sold!'
  estimate: '<yellow>You will get <gold>${MONEY} <yellow>for these Items'
  booster-use:
    MONETARY: '<green><bold>+ ${MONEY} <gray>(<yellow>%multiplier%x Booster <gray><italic>Hover for more Info</italic><gray>)'
    EXP: '<green><bold>+ $%xp% <gray>(<yellow>%multiplier%x Booster <gray><italic>Hover for more Info</italic><gray>)'
  pbooster-use:
    MONETARY: '<green><bold>+ ${MONEY} <gray>(<yellow>%multiplier%x Booster <gray><italic>Hover for more Info</italic><gray>)'
    EXP: '<green><bold>+ $%xp% <gray>(<yellow>%multiplier%x Booster <gray><italic>Hover for more Info</italic><gray>)'

commands:
  booster:
    permission: '<red>You do not have permission to activate a Booster!'
  permission: '<red>You do not have permission for this!'
  usage: '<dark_red>Usage: <red>%usage%'
  reload:
    done: '<gray>All Shops have been reloaded!'
  price-set: '<gray>%item% is now worth <green>$%price% <gray>in the Shop %shop%'
  shop-created: '<gray>You successfully created a new Shop called <aqua>%shop%'
  shop-deleted: '<red>You successfully deleted the Shop called <dark_red>%shop%'
  sellall:
    usage: '<dark_red>Usage: <red>/sellall <Shop>'
  disabled: '<red>This command has been disabled'
  prices:
    usage: '<dark_red>Usage: <red>/prices <Shop>'
    permission: '<red>You do not have permission for this!'

menu:
  accept: '<green>> Click to sell'
  estimate: '<yellow>> Click to estimate'
  cancel: '<red>> Click to cancel'
  title: '<gold><bold>$ Sell your Items $'

booster:
  reset: '<red>Reset %player%''s multiplier to 1.0x'
  extended:
    MONETARY: '<gold>%player% <yellow>has extended the %multiplier%x Booster (Money) for %time% more Minute/s'
    EXP: '<gold>%player% <yellow>has extended the %multiplier%x Booster (Experience) for %time% more Minute/s'
    ALL: '<gold><bold>%player% <yellow>has extended your boosters with %multiplier%x for %time% Minute/s'
  activate:
    ALL: '<gold><bold>%player% <yellow>has activated every booster with %multiplier%x for %time% Minute/s'
    MONETARY: '<gold><bold>%player% <yellow>has activated a %multiplier%x Booster (Money) for %time% Minute/s'
    EXP: '<gold><bold>%player% <yellow>has activated a %multiplier%x Booster (Experience) for %time% Minute/s'
  deactivate:
    MONETARY: '<dark_red>%player%''s <red>%multiplier%x Booster (Money) wore off!'
    EXP: '<dark_red>%player%''s <red>%multiplier%x Booster (Experience) wore off!'
boosters:
  reset: '<red>Reset all Boosters to 1.0x'

editor:
  item-added-success: "<green>¡Ítem añadido correctamente!"
  no-item-in-hand: "<red>¡Debes tener un ítem en la mano para añadirlo!"
  create-shop:
    - '<green><bold>! <gray>Please type in a Name for your Shop in Chat!'
    - '<gray><italic>Color Codes are supported!'
  rename-shop:
    - '<green><bold>! <gray>Please type in a Name for your Shop in Chat!'
    - '<gray><italic>Color Codes are supported!'
  renamed-shop:
    - '<green><bold>! <gray>Successfully renamed Shop!'
  no-inheritance: '<green><bold>! <red>This shop has no inheritance'
  set-permission-shop:
    - '<green><bold>! <gray>Please type in a Permission for your Shop!'
    - '<gray><italic>Type "none" to specify no Permission'
  permission-set-shop: '<green><bold>! <gray>Successfully specified a Permission for your Shop!'

pbooster:
  extended:
    MONETARY: '<yellow>Your %multiplier%x Booster (Money) has been extended for %time% more Minute/s'
    EXP: '<yellow>Your %multiplier%x Booster (Experience) has been extended for %time% more Minute/s'
  activate:
    MONETARY: '<yellow>You have been given a %multiplier%x Booster (Money) for %time% Minute/s'
    EXP: '<yellow>You have been given a %multiplier%x Booster (Experience) for %time% Minute/s'
  deactivate:
    MONETARY: '<dark_red>Your <red>%multiplier%x Booster (Money) wore off!'
    EXP: '<dark_red>Your <red>%multiplier%x Booster (Experience) wore off!'

gui:
  editor:
    title: "<gold><bold>QuickSell - Shop Editor"
    new-shop: "<red>New Shop"
    new-shop-lore: "<gray>Click: <white>Create a new Shop"
    shop-lore:
      - "<reset>Left Click: <gray>Edit Shop"
      - "<reset>Right Click: <gray>Edit Contents"
      - "<reset>Shift + Right Click: <red>Delete Shop"

  settings:
    title: "<gold>Settings: <white>%shop%"
    name: "<yellow>Name: <white>%name%"
    name-lore: "<reset>Click: <gray>Change Name"
    display-item: "<yellow>Display Item"
    display-item-lore: "<reset>Click: <gray>Set item in hand"
    permission: "<gray>Permission: <white>%permission%"
    permission-lore: "<reset>Click: <gray>Change Permission Node"
    permission-none: "None"
    inheritance: "<aqua>Inheritance"
    back: "<red>Back"

  content:
    title: "<gold>Editing: <white>%shop%"
    edit-lore:
      - "<gray>Price: <gold>$%price%"
      - ""
      - "<reset>Left Click: <gray>Edit Price"
      - "<reset>Shift + Right Click: <red>Remove"
    add-item: "<green>Add Item"
    back: "<gray>⇐ Back"

  price-editor:
    title: "<gold>Set Price"
    current-price: "<yellow>Current: $%price%"
    adjustment: "<yellow>+/- $%value%"
    save: "<green>Save"
    cancel: "<red>Cancel"

  inheritance:
    title: "<gold>Inheritance: <white>%shop%"
    status: "<gray>Inherit: %status%"
    enabled: "<green><bold>✔"
    disabled: "<red><bold>✘"